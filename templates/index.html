<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetGuard</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>NetGuard</h1>
            <button class="btn btn-primary btn-sm" onclick="openScanModal()">Scan LAN</button>
        </header>

        <div id="targets-list"></div>

        <!-- Add Target (manual) -->
        <section class="card add-target-section">
            <h2>Add Target Manually</h2>
            <form id="add-target-form" class="add-target-form">
                <input type="text" id="add-mac" placeholder="MAC (aa:bb:cc:dd:ee:ff)" required pattern="[0-9a-fA-F:]{17}">
                <input type="text" id="add-hostname" placeholder="Hostname (optional)">
                <button type="submit" class="btn btn-primary">Add</button>
            </form>
        </section>

        <!-- Activity Log -->
        <section class="card">
            <h2>Recent Activity</h2>
            <div id="log-list"></div>
        </section>
    </div>

    <!-- Scan Modal -->
    <div id="scan-modal" class="modal" hidden>
        <div class="modal-content">
            <div class="modal-header">
                <h2>LAN Devices</h2>
                <button class="btn btn-sm btn-secondary" onclick="closeScanModal()">&times;</button>
            </div>
            <div id="scan-results">Scanning...</div>
        </div>
    </div>

    <!-- Schedule Modal -->
    <div id="schedule-modal" class="modal" hidden>
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="schedule-modal-title">Schedule</h2>
                <button class="btn btn-sm btn-secondary" onclick="closeScheduleModal()">&times;</button>
            </div>
            <div id="schedule-rules-list"></div>
            <form id="schedule-form" class="add-rule-form">
                <select id="rule-day">
                    <option value="weekday">Weekdays</option>
                    <option value="weekend">Weekend</option>
                    <option value="mon">Monday</option>
                    <option value="tue">Tuesday</option>
                    <option value="wed">Wednesday</option>
                    <option value="thu">Thursday</option>
                    <option value="fri">Friday</option>
                    <option value="sat">Saturday</option>
                    <option value="sun">Sunday</option>
                </select>
                <input type="time" id="rule-start" required>
                <span>to</span>
                <input type="time" id="rule-end" required>
                <button type="submit" class="btn btn-primary btn-sm">+ Add</button>
            </form>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
